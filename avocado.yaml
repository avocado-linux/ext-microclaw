supported_targets: '*'

extensions:
  avocado-ext-microclaw:
    version: 0.1.0
    release: r0
    summary: MicroClaw conversational AI assistant
    description: |
      MicroClaw is a lightweight Rust-based agentic assistant daemon.
      Bring-your-own LLM key (Anthropic, OpenAI, OpenRouter, Ollama, ...),
      native MCP client, built-in cron scheduler, and an HTTP/SSE/WebSocket
      API on 127.0.0.1:10961 that desktop UIs can drive.
    license: MIT
    url: https://github.com/microclaw/microclaw
    vendor: Avocado Linux <info@avocadolinux.org>

    package_files:
      - mc-compile.sh
      - mc-install.sh
      - mc-clean.sh
      - avocado.yaml
      - overlay

    overlay: overlay

    enable_services:
      - microclaw.service

    packages:
      microclaw:
        compile: microclaw
        install: mc-install.sh
      libssl3: '*'
      libcrypto3: '*'
      libz1: '*'
      ca-certificates: '*'

sdk:
  image: docker.io/avocadolinux/sdk:{{ env.AVOCADO_DISTRO_RELEASE }}-{{ env.AVOCADO_DISTRO_CHANNEL }}

  compile:
    microclaw:
      compile: mc-compile.sh
      clean: mc-clean.sh
